    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    background-attachment: scroll;
    position: relative;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── 顶部水墨（左上角）── */
  .ink-top {
    position: absolute;
    top: 0; left: 0;
    width: 78%;
    max-width: 560px;
    pointer-events: none;
    z-index: 1;
    opacity: 0.96;
  }
  .ink-top img { width: 100%; height: auto; display: block; }

  /* ── 底部水墨 ── */
  .ink-bottom {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 1;
    line-height: 0;
  }
  .ink-bottom img { width: 100%; height: auto; display: block; }

  /* ── 主内容 ── */
  .content {
    position: relative;
    z-index: 3;
    width: 100%;
    max-width: 380px;
    padding: 0 1.6rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 13vh;
    padding-bottom: 30vh;
  }

  .logo-wrap {
    width: 230px;
    margin-bottom: 2.8rem;
  }
  .logo-wrap img { width: 100%; height: auto; display: block; }

  /* ── 分隔 ── */
  .rule {
    width: 60px;
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 2.6rem;
  }
  .rule::before, .rule::after {
    content: ''; flex: 1; height: 1px;
    background: var(--ink-ghost);
  }
  .rule-dot {
    width: 4px; height: 4px;
    background: var(--ink-soft);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* ── 菜单卡片 ── */
  .menu-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 13px;
  }

  /* 胶囊形按钮：紧凑、居中、自适应宽度 */
  .menu-card {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.62rem 1.4rem;
    width: 100%;
    max-width: 290px;
    justify-content: flex-start;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    text-decoration: none;
    color: inherit;
    position: relative;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    transition: background 0.3s, border-color 0.3s, transform 0.2s, box-shadow 0.3s;
  }
  .menu-card:hover, .menu-card:focus {
    background: var(--card-hover);
    border-color: rgba(20,17,13,0.32);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(20,17,13,0.06);
    outline: none;
  }
  .menu-card:active { transform: translateY(0) scale(0.99); }

  .card-icon {
    width: 19px;
    height: 19px;
    flex-shrink: 0;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.3s, transform 0.3s;
  }
  .card-icon svg { width: 100%; height: 100%; display: block; }
  .menu-card:hover .card-icon { color: var(--seal); }

  .card-divider {
    width: 1px;
    height: 14px;
    background: var(--ink-ghost);
    opacity: 0.5;
    flex-shrink: 0;
  }

  /* 英文为主 */
  .card-en {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--ink);
    text-transform: none;
    white-space: nowrap;
  }
  /* 中文为辅 */
  .card-zh {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    white-space: nowrap;
    margin-right: auto;
  }
  .card-arrow {
    font-family: 'Noto Serif SC', serif;
    color: var(--ink-ghost);
    font-size: 0.9rem;
    transition: transform 0.25s, color 0.25s;
  }
  .menu-card:hover .card-arrow {
    color: var(--ink);
    transform: translateX(4px);
  }

  /* ── 信息 ── */
  .info {
    margin-top: 2.8rem;
    text-align: center;
    font-size: 0.66rem;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    line-height: 2.1;
  }
  .info a { color: var(--ink-dim); text-decoration: none; }
  .info .address {
    font-family: 'Noto Serif SC', serif;
    color: var(--ink-soft);
    font-size: 0.72rem;
    margin-bottom: 0.3rem;
    letter-spacing: 0.05em;
  }

  @media (max-width: 380px) {
    .content { padding-top: 11vh; padding-bottom: 26vh; }
    .logo-wrap { width: 200px; }
  }
</style>
</head>
